<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="SavdoSklad Marketplace | Sifatli Mahsulotlar Markazi">SavdoSklad Marketplace | Sifatli Mahsulotlar Markazi</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/responsive.css">
    <style>
        :root {
            --mp-primary: #4f46e5;
            --mp-secondary: #0ea5e9;
            --mp-bg: #03040b;
            --mp-card: rgba(255, 255, 255, 0.03);
            --mp-border: rgba(255, 255, 255, 0.08);
            --mp-text: #f8fafc;
        }

        body {
            background-color: var(--mp-bg);
            color: var(--mp-text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Hero / Header */
        .mp-navbar {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--mp-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .mp-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mp-search-container {
            flex: 0 1 500px;
            position: relative;
        }

        .mp-search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--mp-border);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        .mp-search-input:focus {
            border-color: var(--mp-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        /* Products Grid */
        .mp-container {
            padding: 40px 5%;
        }

        .mp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .mp-item-card {
            background: var(--mp-card);
            border: 1px solid var(--mp-border);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .mp-item-card:hover {
            transform: translateY(-8px);
            border-color: var(--mp-primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .mp-item-image {
            width: 100%;
            aspect-ratio: 1;
            background: #111;
            border-radius: 14px;
            margin-bottom: 16px;
            object-fit: cover;
        }

        .mp-item-title {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-item-price {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 800;
            color: var(--mp-secondary);
        }

        .mp-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--mp-primary);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
        }

        .btn-add-cart {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--mp-primary);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add-cart:hover {
            transform: scale(1.1);
        }

        /* Decorative Blur */
        .bg-glow {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, transparent 70%);
            top: -10vw;
            right: -10vw;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <nav class="mp-navbar">
        <div class="mp-logo">SavdoSklad MP</div>
        <div class="mp-search-container">
            <i data-lucide="search" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); width:18px; color:rgba(255,255,255,0.4)"></i>
            <input type="text" class="mp-search-input" data-i18n="Mahsulotlarni qidirish..." placeholder="Mahsulotlarni qidirish..." id="mp-search">
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div style="position:relative; cursor:pointer;" id="cart-btn">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count" style="position:absolute; top:-5px; right:-8px; background:#ef4444; color:white; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:800;">0</span>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="location.href='index.html'" data-i18n="Kirish">Kirish</button>
        </div>
    </nav>

    <div class="mp-container" style="display:flex; gap:30px;">
        <!-- Sidebar Categories -->
        <aside style="width:240px; flex-shrink:0;">
            <h3 style="font-size:18px; margin-bottom:20px; color:rgba(255,255,255,0.6)" data-i18n="Kategoriyalar">Kategoriyalar</h3>
            <div id="mp-categories-list" style="display:flex; flex-direction:column; gap:10px;">
                <button class="cat-item active" onclick="filterByCategory(null)" id="cat-all" data-i18n="Barchasi">Barchasi</button>
                <!-- Categories will be injected here -->
            </div>
        </aside>

        <!-- Main Content -->
        <main style="flex:1;">
            <div style="margin-bottom:32px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                  <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; margin-bottom:10px;">Marketplace</h1>
                  <p style="color:rgba(255,255,255,0.5)" data-i18n="Barcha do'konlardagi eng sara mahsulotlar bitta katalogda">Barcha do'konlardagi eng sara mahsulotlar bitta katalogda</p>
                </div>
                <div id="category-title" style="font-size:14px; color:var(--mp-secondary); font-weight:700;" data-i18n="Barcha mahsulotlar">Barcha mahsulotlar</div>
            </div>

            <div id="mp-grid" class="mp-grid">
                <!-- Products will be injected here -->
                <div class="loader"></div>
            </div>
        </main>
    </div>

    <style>
        .cat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--mp-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .cat-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--mp-primary);
        }
        .cat-item.active {
            background: var(--mp-primary);
            border-color: var(--mp-primary);
            font-weight: 700;
        }
    </style>

    <script type="module">
        import { api } from './src/js/api.js';
        import { t, translateDOM } from './src/js/i18n.js';

        let allProducts = [];
        let currentCategory = null;

        async function initMarketplace() {
            translateDOM();
            lucide.createIcons();
            await loadCategories();
            await loadProducts();
        }

        async function loadCategories() {
            try {
                const categories = await api.get('/marketplace/categories');
                const list = document.getElementById('mp-categories-list');
                const html = (categories || []).map(c => `
                    <button class="cat-item" onclick="filterByCategory(${c.id}, '${c.name}')" id="cat-${c.id}">${c.name}</button>
                `).join('');
                list.innerHTML += html;
            } catch (e) { console.error(e); }
        }

        async function loadProducts() {
            const grid = document.getElementById('mp-grid');
            try {
                const data = await api.get('/marketplace/products');
                allProducts = data.products || [];
                renderProducts(allProducts);
            } catch (e) {
                grid.innerHTML = `<p class="error">${t("Xatolik")}: ${e.message}</p>`;
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('mp-grid');
            if (products.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:100px;opacity:0.5;">${t("Mahsulotlar topilmadi")}</p>`;
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="mp-item-card">
                    ${p.discount > 0 ? `<div class="mp-badge">-${p.discount}% OFF</div>` : ''}
                    <img src="${p.images || 'https://via.placeholder.com/300'}" class="mp-item-image" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                    <div class="mp-item-title">${p.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <div style="font-size:11px; opacity:0.4; margin-bottom:4px;">${t("Narxi")}</div>
                            <div class="mp-item-price">${p.price.toLocaleString()} ${t("so'm")}</div>
                        </div>
                        <button class="btn-add-cart" onclick="addToCart(${p.id})">
                            <i data-lucide="plus" style="width:20px"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.filterByCategory = (id, name) => {
            currentCategory = id;
            document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id ? 'cat-' + id : 'cat-all').classList.add('active');
            document.getElementById('category-title').textContent = name || t('Barcha mahsulotlar');
            
            applyFilters();
        };

        document.getElementById('mp-search').oninput = () => applyFilters();

        function applyFilters() {
            const search = document.getElementById('mp-search').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search);
                const matchCat = currentCategory ? p.marketplaceCategoryId === currentCategory : true;
                return matchSearch && matchCat;
            });
            renderProducts(filtered);
        }

        let cart = [];
        window.addToCart = (id) => {
            cart.push(id);
            document.getElementById('cart-count').textContent = cart.length;
            // toast or animation
        };

        initMarketplace();
    </script>
</body>
</html>
