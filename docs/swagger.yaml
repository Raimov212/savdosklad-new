  title: SavdoSklad API
  version: "1.0"
paths:
  /admin/districts:
    get:
      consumes:
      - application/json
      parameters:
      - description: Filter by Region ID
        in: query
        name: regionId
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.District'
            type: array
      security:
      - BearerAuth: []
      summary: Get all districts (optionally by regionId)
      tags:
      - Admin Geography
    post:
      consumes:
      - application/json
      parameters:
      - description: Create district request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/entity.CreateDistrictRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Create a district
      tags:
      - Admin Geography
  /admin/districts/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: District ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete district
      tags:
      - Admin Geography
    put:
      consumes:
      - application/json
      parameters:
      - description: District ID
        in: path
        name: id
        required: true
        type: integer
